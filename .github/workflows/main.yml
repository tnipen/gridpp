# This is a basic workflow to help you get started with Actions

name: Publish

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v2
      - name: dependencies
        run: sudo apt update -qq && sudo apt install swig libboost-dev libarmadillo8 libarmadillo-dev cmake netcdf-bin libnetcdf-dev libgsl-dev python3-setuptools python3-nose python3-numpy python3-scipy python3-wheel
      - name: configure
        run: mkdir build && cd build && cmake -DBUILD_R=no ..
      - name: build
        run: cd build && VERBOSE=1 make build-python && VERBOSE=1 make package-python
      # - name: test
      #   run: nosetests3
      - name: Build wheel
        uses: RalfG/python-wheels-manylinux-build@v0.2.2-manylinux1_x86_64
        with:
          # python-versions: 'cp36-cp36m cp37-cp37m'
          python-versions: 'cp36-cp36m'
          # build-requirements: 'cython numpy'
          system-packages: 'armadillo armadillo-devel gsl gsl-devel boost-devel'
          package-path: 'build/extras/python/'
          # pip-wheel-args: '--no-deps'
      - name: pypi-publish
        uses: pypa/gh-action-pypi-publish@v1.2.2
        with:
          # PyPI user
          user: tnipen
          # Password for your PyPI user or an access token
          password: ${{ secrets.pypi_test_password }}
          # The repository URL to use
          repository_url: https://test.pypi.org/legacy/
    # The target directory for distribution
          packages_dir: build/extras/python/dist/
    # Check metadata before uploading
    #verify_metadata: # optional, default is true
