# This is a basic workflow to help you get started with Actions

name: Build

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v2
      - name: dependencies
        run: sudo apt update -qq && sudo apt install swig libboost-dev libarmadillo8 libarmadillo-dev cmake netcdf-bin libnetcdf-dev libgsl-dev python3-setuptools
      - name: configure
        run: mkdir build && cd build && cmake -DBUILD_R=no ..
      - name: build_dependencies
        run: pip3 install numpy nose --user
      - name: build
        run: cd build && VERBOSE=1 make develop-python-user
      - name: test
        run: nosetests3
